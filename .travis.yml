language: android
jdk: oraclejdk8
android:
  components:
    - build-tools-35.0.0
    - platform-tools
    - android-35
script:
  - ./gradlew assembleDebug
deploy:
  provider: releases
  api_key:
    secure: $GITHUB_TOKEN
  file: app/build/outputs/apk/debug/app-debug.apk
  skip_cleanup: true
  on:
    tags: true
